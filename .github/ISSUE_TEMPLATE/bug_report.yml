name: Bug report
description: Something is broken, throws an error, or produces wrong output.
title: "[bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can — debugging without the environment details takes much longer.

        For correctness bugs in a kernel, please also include the input shapes and dtypes that triggered the discrepancy.

  - type: input
    id: gpu
    attributes:
      label: GPU
      description: Full name from `nvidia-smi` (top-right of the table).
      placeholder: NVIDIA H100 80GB HBM3
    validations:
      required: true

  - type: input
    id: driver
    attributes:
      label: Driver version
      description: From `nvidia-smi` (top-left of the table).
      placeholder: "550.54.15"
    validations:
      required: true

  - type: input
    id: cuda
    attributes:
      label: CUDA toolkit version
      description: From `nvcc --version`.
      placeholder: "12.4"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: From `python --version`.
      placeholder: "3.11.7"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command that triggered the bug
      description: The exact command line. Include flags.
      render: bash
      placeholder: uv run benchmark.py --kernel rms_norm
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Full error output
      description: Paste the full stack trace — please do not summarise. The full trace usually contains the actual cause.
      render: text
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducer (optional)
      description: If you can isolate the bug to a small snippet, include it here. Otherwise the command above is enough.

  - type: textarea
    id: env
    attributes:
      label: "Environment / GPU info (optional)"
      description: The `=== GPU INFO ===` block printed by `uv run benchmark.py` — helps confirm your environment matches what's supported.
      render: text
